<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Changelog — Here to Slay: DUNGEONS Mapper</title>
    <link rel="icon" type="image/png" href="./icons/d20.png" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      :root {
        color-scheme: light;
      }

      body.changelog-page {
        --changelog-max: 980px;
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 10%, color-mix(in srgb, var(--accent-soft) 48%, transparent) 0%, transparent 34%),
          radial-gradient(circle at 88% 88%, color-mix(in srgb, var(--accent) 16%, transparent) 0%, transparent 28%),
          var(--bg);
      }

      .changelog-page-shell {
        width: min(var(--changelog-max), calc(100% - 28px));
        margin: 0 auto;
        padding: 24px 0 48px;
      }

      .changelog-topbar,
      .changelog-card {
        border: 1px solid var(--border);
        border-radius: 20px;
        background: color-mix(in srgb, var(--panel) 92%, white 8%);
        box-shadow: var(--shadow);
      }

      .changelog-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
        padding: 14px 16px;
        flex-wrap: wrap;
      }

      .changelog-title-wrap h1 {
        margin: 0;
        font-size: clamp(1.8rem, 3.8vw, 2.5rem);
        font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
        color: var(--brand-color);
      }

      .changelog-title-wrap p {
        margin: 6px 0 0;
        color: var(--muted);
      }

      .changelog-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .changelog-version {
        color: var(--muted);
        font-size: 0.86rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .changelog-back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 12px;
        border: 1px solid var(--control-border);
        border-radius: 10px;
        background: var(--control-bg);
        color: var(--control-text);
        text-decoration: none;
        white-space: nowrap;
      }

      .changelog-back-link:hover,
      .changelog-back-link:focus-visible {
        background: var(--control-hover);
        outline: none;
      }

      .changelog-card {
        padding: 22px;
      }

      .changelog-content h1,
      .changelog-content h2,
      .changelog-content h3 {
        margin: 0 0 12px;
        line-height: 1.15;
        color: var(--brand-color);
      }

      .changelog-content h1 {
        font-size: 1.55rem;
      }

      .changelog-content h2 {
        margin-top: 22px;
        font-size: 1.25rem;
      }

      .changelog-content h3 {
        margin-top: 18px;
        font-size: 1.05rem;
      }

      .changelog-content p {
        margin: 0 0 12px;
        line-height: 1.6;
      }

      .changelog-content ul {
        margin: 0 0 16px;
        padding-left: 22px;
      }

      .changelog-content li {
        margin: 0 0 10px;
        line-height: 1.55;
      }

      .changelog-content code {
        padding: 0.12rem 0.34rem;
        border: 1px solid color-mix(in srgb, var(--border) 82%, transparent);
        border-radius: 6px;
        background: color-mix(in srgb, var(--surface-elevated) 84%, white 16%);
        font-size: 0.92em;
      }

      .changelog-release-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 14px;
        margin: 0 0 18px;
        padding-bottom: 14px;
        border-bottom: 1px solid color-mix(in srgb, var(--border) 78%, transparent);
        flex-wrap: wrap;
      }

      .changelog-release-head h2 {
        margin: 0;
        font-size: clamp(1.3rem, 3vw, 1.8rem);
      }

      .changelog-release-label {
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .changelog-empty {
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .changelog-page-shell {
          width: min(var(--changelog-max), calc(100% - 20px));
          padding-top: 18px;
        }

        .changelog-card {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body class="changelog-page">
    <main class="changelog-page-shell">
      <div class="changelog-topbar">
        <div class="changelog-title-wrap">
          <h1>Changelog</h1>
          <p>Detailed release notes for the mapper web app and MacOS App.</p>
        </div>
        <div class="changelog-actions">
          <div class="changelog-version">v__APP_VERSION__</div>
          <a class="changelog-back-link" href="./about.html">Back to Guide</a>
        </div>
      </div>

      <section class="changelog-card">
        <div id="changelog-content" class="changelog-content" aria-live="polite">
          <div class="changelog-release-head">
            <h2>Version v__APP_VERSION__</h2>
            <div class="changelog-release-label">Current Release</div>
          </div>
          __CHANGELOG_CONTENT__
        </div>
      </section>
    </main>
  </body>
</html>
