<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Export Preview</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6efe7;
      --panel: #fff8f0;
      --panel-border: #d8c5b5;
      --ink: #231a14;
      --muted: #6f5a49;
      --accent: #c86c2f;
      --accent-strong: #a95218;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font: 600 16px/1.4 "Avenir Next", "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--panel-border);
      background: linear-gradient(180deg, #fffaf5 0%, #f4e8db 100%);
      box-shadow: 0 1px 0 rgba(255,255,255,0.65) inset;
      z-index: 1;
    }

    .title-group {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .title {
      font-size: 1rem;
      font-weight: 800;
      color: var(--accent-strong);
    }

    .subtitle {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex: 0 0 auto;
    }

    button {
      appearance: none;
      border: 1px solid color-mix(in srgb, var(--accent) 62%, var(--panel-border) 38%);
      border-radius: 10px;
      background: color-mix(in srgb, var(--accent) 74%, white 26%);
      color: var(--ink);
      padding: 8px 12px;
      font: inherit;
      font-size: 0.85rem;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: color-mix(in srgb, var(--accent) 84%, white 16%);
    }

    .preview-content {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      overflow: auto;
      background: var(--bg);
    }

    @media print {
      .toolbar {
        display: none;
      }

      body {
        overflow: visible;
      }

      .preview-content {
        overflow: visible;
      }
    }
  </style>
</head>
<body>
  <header class="toolbar">
    <div class="title-group">
      <div class="title">PDF Export Preview</div>
      <div id="subtitle" class="subtitle">Open the print dialog when you're ready to save as PDF.</div>
    </div>
    <div class="actions">
      <button id="print-btn" type="button">Print / Save PDF</button>
      <button id="close-btn" type="button">Close</button>
    </div>
  </header>
  <div id="preview-content" class="preview-content"></div>
  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      const storageKey = params.get("storageKey");
      const subtitle = document.getElementById("subtitle");
      const previewContent = document.getElementById("preview-content");
      const printBtn = document.getElementById("print-btn");
      const closeBtn = document.getElementById("close-btn");

      if (!storageKey) {
        subtitle.textContent = "Missing PDF export preview data.";
        printBtn.disabled = true;
        return;
      }

      let exportHtml = "";
      try {
        exportHtml = localStorage.getItem(storageKey) || "";
        localStorage.removeItem(storageKey);
      } catch (error) {
        subtitle.textContent = "Could not read PDF export preview data.";
        printBtn.disabled = true;
        return;
      }

      if (!exportHtml) {
        subtitle.textContent = "PDF export preview expired.";
        printBtn.disabled = true;
        return;
      }

      // Extract the <body> content and <style> from the export HTML and inject directly
      const parser = new DOMParser();
      const doc = parser.parseFromString(exportHtml, "text/html");
      // Inject export styles into this document's head
      for (const style of doc.querySelectorAll("style")) {
        document.head.appendChild(style.cloneNode(true));
      }
      // Inject export body content into the preview div
      previewContent.innerHTML = doc.body.innerHTML;

      printBtn.addEventListener("click", async () => {
        const invoke = window.__TAURI__?.core?.invoke;
        if (invoke) {
          try {
            await invoke("plugin:webview|print");
            return;
          } catch (error) {
            console.error("Tauri webview print failed:", error);
          }
          // fallback: try the Webview object
          try {
            const wv = window.__TAURI__?.webview?.getCurrentWebview?.();
            if (wv?.print) {
              await wv.print();
              return;
            }
          } catch (error) {
            console.error("Tauri getCurrentWebview().print() failed:", error);
          }
        }
        // browser fallback
        try {
          window.focus();
          window.print();
        } catch (error) {
          console.error("window.print() failed:", error);
        }
        subtitle.textContent = "Could not open the print dialog. Check the console for details.";
      });

      closeBtn.addEventListener("click", () => {
        const tauriWindow = window.__TAURI__?.window?.getCurrentWindow?.();
        if (tauriWindow) {
          void tauriWindow.close();
          return;
        }
        window.close();
      });
    })();
  </script>
</body>
</html>
