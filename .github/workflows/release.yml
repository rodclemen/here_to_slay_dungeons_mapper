name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: --bundles nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "HtSD Mapper v__VERSION__"
          releaseBody: "See the changelog for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Collect updater files (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p updater-files
          cp src-tauri/target/universal-apple-darwin/release/bundle/macos/HtSDMapper.app.tar.gz.sig updater-files/
        shell: bash

      - name: Collect updater files (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          mkdir -p updater-files
          cp src-tauri/target/release/bundle/nsis/*-setup.nsis.zip updater-files/
          cp src-tauri/target/release/bundle/nsis/*-setup.nsis.zip.sig updater-files/
        shell: bash

      - name: Upload updater files
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.platform == 'macos-latest' && 'macos' || 'windows' }}
          path: updater-files/

  updater-json:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download signatures
        uses: actions/download-artifact@v4
        with:
          path: sigs

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: List downloaded files
        run: find sigs/ -type f

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAC_SIG=$(cat sigs/updater-macos/*.sig)
          WIN_SIG=$(cat sigs/updater-windows/*.nsis.zip.sig)

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See the changelog for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-universal": {
                "signature": "${MAC_SIG}",
                "url": "https://github.com/rodclemen/here_to_slay_dungeons_mapper/releases/download/v${VERSION}/HtSDMapper_universal.app.tar.gz"
              },
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "https://github.com/rodclemen/here_to_slay_dungeons_mapper/releases/download/v${VERSION}/HtSDMapper_universal.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${MAC_SIG}",
                "url": "https://github.com/rodclemen/here_to_slay_dungeons_mapper/releases/download/v${VERSION}/HtSDMapper_universal.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/rodclemen/here_to_slay_dungeons_mapper/releases/download/v${VERSION}/HtSDMapper_${VERSION}_x64-setup.nsis.zip"
              }
            }
          }
          EOF

          cat latest.json

      - name: Upload latest.json and Windows updater bundle to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release upload "v${VERSION}" latest.json --repo rodclemen/here_to_slay_dungeons_mapper --clobber
          gh release upload "v${VERSION}" sigs/updater-windows/*.nsis.zip --repo rodclemen/here_to_slay_dungeons_mapper --clobber
