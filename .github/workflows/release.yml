name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: --bundles nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build and upload to draft release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "HtSD Mapper v__VERSION__"
          releaseBody: "See the changelog for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # tauri-action re-packages the .app into .tar.gz for upload, which
      # overwrites the signed .tar.gz and invalidates its .sig file.
      # We re-create the tar.gz from the .app and sign it ourselves.
      - name: Re-sign macOS updater bundle
        if: matrix.platform == 'macos-latest'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle/macos"
          APP_PATH="${BUNDLE_DIR}/HtSDMapper.app"
          TAR_PATH="${BUNDLE_DIR}/HtSDMapper.app.tar.gz"

          # Re-create the tar.gz from the .app
          tar -czf "${TAR_PATH}" -C "${BUNDLE_DIR}" "HtSDMapper.app"

          # Sign using the tauri CLI — set TAURI_SIGNING_PRIVATE_KEY_PATH to avoid
          # GitHub Actions secret masking issues with the env var value
          KEY_FILE=$(mktemp)
          printf '%s' "${TAURI_SIGNING_PRIVATE_KEY}" > "${KEY_FILE}"
          TAURI_SIGNING_PRIVATE_KEY_PATH="${KEY_FILE}" \
          TAURI_SIGNING_PRIVATE_KEY="" \
          npx tauri signer sign "${TAR_PATH}"
          rm -f "${KEY_FILE}"

          echo "Signed ${TAR_PATH}"
          ls -la "${TAR_PATH}" "${TAR_PATH}.sig"

      - name: Collect updater files (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p updater-files
          cp src-tauri/target/universal-apple-darwin/release/bundle/macos/HtSDMapper.app.tar.gz.sig updater-files/

      - name: Collect updater files (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p updater-files
          NSIS_DIR="src-tauri/target/release/bundle/nsis"
          cp "${NSIS_DIR}/"*-setup.nsis.zip updater-files/ || true
          cp "${NSIS_DIR}/"*-setup.nsis.zip.sig updater-files/ || true
          # List what we found
          ls -la updater-files/

      - name: Upload updater files
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.platform == 'macos-latest' && 'macos' || 'windows' }}
          path: updater-files/
          if-no-files-found: warn

  updater-json:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts/ -type f || echo "No artifacts found"

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          MAC_SIG=""
          WIN_SIG=""

          if [ -d artifacts/updater-macos ]; then
            MAC_SIG=$(cat artifacts/updater-macos/*.sig 2>/dev/null || echo "")
          fi
          if [ -d artifacts/updater-windows ]; then
            WIN_SIG=$(cat artifacts/updater-windows/*.nsis.zip.sig 2>/dev/null || echo "")
          fi

          if [ -z "$MAC_SIG" ] && [ -z "$WIN_SIG" ]; then
            echo "No signatures found. Cannot generate latest.json."
            exit 1
          fi

          # Build platforms object
          PLATFORMS="{"
          if [ -n "$MAC_SIG" ]; then
            MAC_URL="https://github.com/rodclemen/here_to_slay_dungeons_mapper/releases/download/v${VERSION}/HtSDMapper_universal.app.tar.gz"
            PLATFORMS="$PLATFORMS\"darwin-universal\":{\"signature\":\"${MAC_SIG}\",\"url\":\"${MAC_URL}\"},"
            PLATFORMS="$PLATFORMS\"darwin-aarch64\":{\"signature\":\"${MAC_SIG}\",\"url\":\"${MAC_URL}\"},"
            PLATFORMS="$PLATFORMS\"darwin-x86_64\":{\"signature\":\"${MAC_SIG}\",\"url\":\"${MAC_URL}\"},"
          fi
          if [ -n "$WIN_SIG" ]; then
            WIN_URL="https://github.com/rodclemen/here_to_slay_dungeons_mapper/releases/download/v${VERSION}/HtSDMapper_${VERSION}_x64-setup.nsis.zip"
            PLATFORMS="$PLATFORMS\"windows-x86_64\":{\"signature\":\"${WIN_SIG}\",\"url\":\"${WIN_URL}\"},"
          fi
          # Remove trailing comma and close
          PLATFORMS="${PLATFORMS%,}}"

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See the changelog for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": ${PLATFORMS}
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

          # Upload latest.json to the release
          gh release upload "v${VERSION}" latest.json --repo rodclemen/here_to_slay_dungeons_mapper --clobber

          # Upload Windows nsis.zip if available
          if [ -d artifacts/updater-windows ]; then
            for f in artifacts/updater-windows/*.nsis.zip; do
              [ -f "$f" ] && gh release upload "v${VERSION}" "$f" --repo rodclemen/here_to_slay_dungeons_mapper --clobber
            done
          fi

          echo "Done! latest.json and updater bundles uploaded."
