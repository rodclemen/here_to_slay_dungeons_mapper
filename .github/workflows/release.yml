name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            bundle_dir: target/universal-apple-darwin/release/bundle
          - platform: windows-latest
            args: --bundles nsis
            bundle_dir: target/release/bundle
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build ${{ matrix.args }}

      - name: List bundle output
        run: find src-tauri/${{ matrix.bundle_dir }} -type f -name "*.sig" -o -name "*.tar.gz" -o -name "*.nsis.zip" -o -name "*.dmg" -o -name "*.exe" 2>/dev/null || dir /s /b src-tauri\${{ matrix.bundle_dir }} 2>NUL
        shell: bash

      - name: Collect updater files (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p updater-files
          cp src-tauri/${{ matrix.bundle_dir }}/macos/HtSDMapper.app.tar.gz updater-files/
          cp src-tauri/${{ matrix.bundle_dir }}/macos/HtSDMapper.app.tar.gz.sig updater-files/
          cp src-tauri/${{ matrix.bundle_dir }}/dmg/*.dmg updater-files/ || true

      - name: Collect updater files (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p updater-files
          cp src-tauri/${{ matrix.bundle_dir }}/nsis/*-setup.exe updater-files/
          cp src-tauri/${{ matrix.bundle_dir }}/nsis/*-setup.nsis.zip updater-files/
          cp src-tauri/${{ matrix.bundle_dir }}/nsis/*-setup.nsis.zip.sig updater-files/

      - name: Upload updater files
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.platform == 'macos-latest' && 'macos' || 'windows' }}
          path: updater-files/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts/ -type f

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAC_SIG=$(cat artifacts/updater-macos/*.tar.gz.sig)
          WIN_SIG=$(cat artifacts/updater-windows/*.nsis.zip.sig)

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See the changelog for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-universal": {
                "signature": "${MAC_SIG}",
                "url": "https://github.com/rodclemen/here_to_slay_dungeons_mapper/releases/download/v${VERSION}/HtSDMapper_universal.app.tar.gz"
              },
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "https://github.com/rodclemen/here_to_slay_dungeons_mapper/releases/download/v${VERSION}/HtSDMapper_universal.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${MAC_SIG}",
                "url": "https://github.com/rodclemen/here_to_slay_dungeons_mapper/releases/download/v${VERSION}/HtSDMapper_universal.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/rodclemen/here_to_slay_dungeons_mapper/releases/download/v${VERSION}/HtSDMapper_${VERSION}_x64-setup.nsis.zip"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

      - name: Create draft release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          REPO="rodclemen/here_to_slay_dungeons_mapper"

          # Create draft release
          gh release create "${TAG}" \
            --repo "${REPO}" \
            --title "HtSD Mapper ${TAG}" \
            --notes "See the changelog for details." \
            --draft

          # Upload all release assets
          gh release upload "${TAG}" --repo "${REPO}" \
            latest.json \
            artifacts/updater-macos/HtSDMapper.app.tar.gz#HtSDMapper_universal.app.tar.gz \
            artifacts/updater-windows/*-setup.exe \
            artifacts/updater-windows/*-setup.nsis.zip

          # Upload DMG if present
          gh release upload "${TAG}" --repo "${REPO}" \
            artifacts/updater-macos/*.dmg || true

          echo "Draft release created: https://github.com/${REPO}/releases/tag/${TAG}"
