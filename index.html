<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Here to Slay Tile Randomizer Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>Tile Randomizer Prototype</h1>
          <p>Place the Entrance Tile, then place 6 random Dungeon Tiles with at least 2-side contact.</p>
        </div>
        <div class="actions">
          <select id="ui-theme-select" aria-label="UI Theme">
            <option value="current">Current</option>
            <option value="molten">Molten</option>
          </select>
          <details class="view-menu">
            <summary>Debug</summary>
            <div class="view-menu-panel">
              <label>
                <input id="toggle-labels-checkbox" type="checkbox" />
                <span>Show Numbers</span>
              </label>
              <label>
                <input id="toggle-walls-checkbox" type="checkbox" />
                <span>Show Walls</span>
              </label>
              <label>
                <input id="toggle-ignore-contact-checkbox" type="checkbox" />
                <span>Ignore 4-Point Rule</span>
              </label>
              <label>
                <input id="toggle-face-feedback-checkbox" type="checkbox" checked />
                <span>Face Feedback</span>
              </label>
            </div>
          </details>
          <details class="settings-menu">
            <summary>Settings</summary>
            <div class="settings-menu-panel">
              <button id="save-dungeon-btn" type="button">Save Dungeon</button>
              <button id="load-dungeon-btn" type="button">Load Dungeon</button>
              <button id="zoom-reset-btn" type="button">Zoom 100%</button>
              <input id="load-dungeon-input" type="file" accept="application/json,.json" hidden />
            </div>
          </details>
          <button id="toggle-wall-edit-btn" type="button">Wall Editor</button>
          <button id="clear-tile-walls-btn" class="wall-edit-only" type="button">Clear Tile Walls</button>
          <button id="export-wall-data-btn" class="wall-edit-only" type="button">Export Debug Walls</button>
          <button id="import-wall-data-btn" class="wall-edit-only" type="button">Import Debug Walls</button>
          <input id="import-wall-data-input" type="file" accept="application/json" hidden />
        </div>
      </header>

      <section class="workspace">
        <div id="board" class="board" aria-label="Placement board"></div>
        <aside class="sidebar">
          <div class="tray-head">
            <h2>Tile Tray</h2>
            <div class="tray-action-icons" aria-label="Tile tray actions">
              <button id="reroll-btn" type="button" title="Reroll Tiles" aria-label="Reroll Tiles">
                <img src="./icons/reroll.png" alt="" aria-hidden="true" />
              </button>
              <button id="reset-tiles-btn" type="button" title="Reset Tiles" aria-label="Reset Tiles">
                <img src="./icons/reset.png" alt="" aria-hidden="true" />
              </button>
            </div>
            <div class="tray-pickers">
              <label class="theme-picker">
                <span class="theme-label">Tile Set</span>
                <select id="tile-set-select" aria-label="Tile Set">
                  <option value="molten">Molten</option>
                  <option value="overgrown">Overgrown</option>
                  <option value="dreamscape">Dreamscape</option>
                  <option value="nightmare">Nightmare</option>
                  <option value="submerged">Submerged</option>
                  <option value="deep_freeze">Deep Freeze</option>
                </select>
              </label>
            </div>
          </div>
          <div id="tray" class="tray"></div>
          <div class="reserve-boss-row">
            <div class="reserve-area">
              <div id="reserve-pile" class="reserve-pile" aria-label="Reserve Tiles"></div>
              <input id="reserve-edit-checkbox" type="checkbox" hidden />
            </div>
            <div id="boss-pile" class="boss-pile" aria-label="Boss Selection"></div>
          </div>
          <div id="status" class="status" role="status" aria-live="polite" aria-label="Placement Feedback"></div>
        </aside>
      </section>

      <section id="wall-editor-page" class="wall-editor-page" aria-label="Wall Editor"></section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
